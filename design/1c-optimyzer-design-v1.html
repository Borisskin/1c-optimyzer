        },
        colors: {
          ink: {
            900: '#0A0A0A',
            700: '#262626',
            600: '#404040',
            500: '#525252',
            400: '#737373',
            300: '#A3A3A3',
            200: '#D4D4D4',
            150: '#E5E5E5',
            100: '#EDEDED',
            75: '#F0F0F0',
            50: '#F5F5F5',
            25: '#FAFAFA',

            50: '#F0FDFA',
            100: '#CCFBF1',
            500: '#14B8A6',
            600: '#0D9488',
            700: '#0F766E',
            800: '#115E59',
            900: '#134E4A',
          },
          ok: { DEFAULT: '#16A34A', bg: '#F0FDF4' },
          warn: { DEFAULT: '#D97706', bg: '#FFFBEB' },
          err: { DEFAULT: '#DC2626', bg: '#FEF2F2' },

          panel: '0 1px 0 rgba(10,10,10,0.04), 0 1px 2px rgba(10,10,10,0.04)',

        },
        fontSize: {
          '2xs': ['10px', '14px'],
        }
      }
    }

</script>
<style>
  html, body { background: #FAFAFA; color: #0A0A0A; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { font-feature-settings: "cv11", "ss01"; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "calt", "ss01"; }
  /* Hairline borders */
  .hl { border-color: #EDEDED; }
  .hl2 { border-color: #E5E5E5; }
  /* LED ring effect */
  .led { box-shadow: 0 0 0 3px rgba(22,163,74,0.10); }
  .led-w { box-shadow: 0 0 0 3px rgba(217,119,6,0.12); }
  .led-e { box-shadow: 0 0 0 3px rgba(220,38,38,0.12); }
  /* Custom scrollbar */
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: #E5E5E5; border-radius: 6px; border: 2px solid #FAFAFA; }
  *::-webkit-scrollbar-thumb:hover { background: #D4D4D4; }
  *::-webkit-scrollbar-track { background: transparent; }
  /* Tabular numerics everywhere it matters */
  .tnum { font-variant-numeric: tabular-nums; }
  /* Fine diagonal hatch utility for placeholders */
  .hatch {
    background-image: repeating-linear-gradient(135deg, #F5F5F5 0 6px, #FFFFFF 6px 12px);
  }
  /* Slim divider */
  .div-v { width:1px; background:#EDEDED; }
  .div-h { height:1px; background:#EDEDED; }
  /* Stripped table hover */
  .row:hover { background: #FAFAFA; }
  .row[data-active="1"] { background: #F0FDFA; box-shadow: inset 2px 0 0 #0F766E; }
  /* Real-time pulse */
  @keyframes pulse-dot { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
  .pulse { animation: pulse-dot 1.6s ease-in-out infinite; }
  /* Slide in for drawer */
  @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .slide-in { animation: slideInRight 200ms ease-out; }
  /* Fade between screens */
  @keyframes fadeIn { from { opacity: 0.4; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 200ms ease-out forwards; }
  /* Subtle highlight for changing numbers */
  @keyframes flash { 0% { background-color: rgba(15,118,110,0.16); } 100% { background-color: transparent; } }
  .flash { animation: flash 800ms ease-out; }
  /* SQL/BSL code chrome */
  .codebox { background:#FBFBFA; border:1px solid #EDEDED; border-radius:6px; }
  /* Square focus ring for inputs */
  input:focus, button:focus, select:focus { outline: 2px solid #0F766E; outline-offset: 1px; }
  /* Tighter kerning for big numbers */
  .display { letter-spacing: -0.02em; font-feature-settings: "tnum"; }
  /* App grid */
  .app {
    display: grid;
    grid-template-columns: 56px 1fr;
    grid-template-rows: 48px 1fr 28px;
    height: 100vh;
    min-width: 1280px;
  }
  .app[data-sidebar="open"] { grid-template-columns: 232px 1fr; }
  /* Kbd styling */
  kbd { font-family:'JetBrains Mono',monospace; font-size:10.5px; padding:1px 5px; border:1px solid #E5E5E5; border-bottom-width:2px; background:#FFFFFF; border-radius:4px; color:#525252; }
</style>
